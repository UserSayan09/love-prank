<!DOCTYPE html>
<html>
<head>
    <title>Do you love me?</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:200px;
        }

        button{
            padding:10px 20px;
            font-size:20px;
            margin:10px;
        }

        #no{
            position:absolute;
        }
    </style>

</head>

<body>

<h1>Do you love me? ❤️</h1>

<button onclick="yes()">Yes</button>
<button id="no" onmouseover="move()">No</button>

<script>

function yes(){
    alert("I knew it 😍");
}

function move(){
    var x=Math.random()*500;
    var y=Math.random()*300;

    document.getElementById("no").style.left=x+"px";
    document.getElementById("no").style.top=y+"px";
}

</script>

</body>
</html>
