<!DOCTYPE html>
<html>
<head>
<title>Do you love me?</title>

<style>

body{
text-align:center;
font-family:Arial;
margin-top:150px;
background:pink;
}

button{
padding:12px 25px;
font-size:20px;
margin:10px;
cursor:pointer;
}

#no{
position:absolute;
}

</style>

</head>

<body>

<h1>Do you love me? ❤️</h1>

<button onclick="yes()">Yes</button>
<button id="no">No</button>

<script>

var no=document.getElementById("no");

function move(){

var x=Math.random()*window.innerWidth*0.8;
var y=Math.random()*window.innerHeight*0.8;

no.style.left=x+"px";
no.style.top=y+"px";

}

no.addEventListener("mouseover",move);
no.addEventListener("click",move);
no.addEventListener("touchstart",move);

function yes(){

document.body.innerHTML="<h1>I knew it 😍❤️</h1>";

for(let i=0;i<50;i++){

let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"%";
heart.style.top="-10px";
heart.style.fontSize="30px";

document.body.appendChild(heart);

let fall=setInterval(()=>{
heart.style.top=parseInt(heart.style.top)+5+"px";
},50);

}

}

</script>

</body>
</html>
